# Tide Quarterzip for the sophisticated passengers
- type: loadoutEffectGroup
  id: SophisticatedTider
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobPassenger
      time: 288000 # 80 hrs

# Quarterzip
- type: loadout
  id: QuarterzipJumpsuit
  effects:
  - !type:GroupLoadoutEffect
    proto: SophisticatedTider
  equipment:
    jumpsuit: ClothingUniformJumpsuitPassengerQuarterzip

# Overalls # inky
- type: loadout # inky
  id: OverallsJumpsuit # inky
  equipment: # inky
    jumpsuit: ClothingUniformOveralls # inky

# recruit jumpsuit # inky

- type: loadout # inky
  id: JumpsuitRecruit # inky
  effects: # inky
  - !type:GroupLoadoutEffect # inky
    proto: Noob # inky
  equipment: # inky
    jumpsuit: ClothingUniformJumpsuitRecruitNT # inky

