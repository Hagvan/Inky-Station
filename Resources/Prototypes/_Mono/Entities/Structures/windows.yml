# strong windows for outposts sir! # inky

- type: entity # inky
  id: ReinforcedWindowOutpost # inky
  suffix: OUTPOST ONLY # inky
  name: reinforced window # inky
  parent: ReinforcedWindow # inky
  components: # inky
  - type: Destructible # inky
    thresholds: # inky
    - trigger: # inky
        !type:DamageTrigger # inky
        damage: 10000 #excess damage (nuke?). avoid computational cost of spawning entities. # inky
      behaviors: # inky
      - !type:DoActsBehavior # inky
        acts: [ "Destruction" ] # inky
      - !type:PlaySoundBehavior # inky
        sound: # inky
          collection: WindowShatter # inky
    - trigger: # inky
        !type:DamageTrigger # inky
        damage: 5000 # inky
      behaviors: # inky
      - !type:PlaySoundBehavior # inky
        sound: # inky
          collection: WindowShatter # inky
      - !type:SpawnEntitiesBehavior # inky
        spawn: # inky
          ShardGlassReinforced: # inky
            min: 1 # inky
            max: 2 # inky
      - !type:DoActsBehavior # inky
        acts: [ "Destruction" ] # inky

- type: entity # inky
  parent: ReinforcedWindowDiagonal # inky
  id: ReinforcedWindowDiagonalOutpost # inky
  suffix: diagonal, OUTPOST ONLY # inky
  placement: # inky
    mode: SnapgridCenter # inky
    snap: # inky
    - Window # inky
  components: # inky
  - type: Destructible # inky
    thresholds: # inky
    - trigger: # inky
        !type:DamageTrigger # inky
        damage: 10000 #excess damage (nuke?). avoid computational cost of spawning entities. # inky
      behaviors: # inky
      - !type:DoActsBehavior # inky
        acts: [ "Destruction" ] # inky
      - !type:PlaySoundBehavior # inky
        sound: # inky
          collection: WindowShatter # inky
    - trigger: # inky
        !type:DamageTrigger # inky
        damage: 5000 # inky
      behaviors: # inky
      - !type:PlaySoundBehavior # inky
        sound: # inky
          collection: WindowShatter # inky
      - !type:SpawnEntitiesBehavior # inky
        spawn: # inky
          ShardGlassReinforced: # inky
            min: 1 # inky
            max: 2 # inky
      - !type:DoActsBehavior # inky
        acts: [ "Destruction" ] # inky

